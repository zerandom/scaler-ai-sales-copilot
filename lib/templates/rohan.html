<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap');
  
  *, *::before, *::after { box-sizing: border-box; }
  body { 
    font-family: 'Manrope', sans-serif; 
    margin: 0; padding: 0; 
    color: #1a1a1a; 
    background: #fff;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  
  /* A4 Landscape */
  .page { 
    width: 297mm; height: 210mm; 
    page-break-after: always; 
    position: relative; 
    overflow: hidden; 
  }
  
  /* Colors */
  :root {
    --green-dark: #123524;
    --green-light: #2a5a41;
    --orange: #ea580c;
    --gray-bg: #f8fafc;
    --gray-text: #475569;
  }

  /* PAGE 1: COVER */
  .p1-layout { display: flex; height: 100%; }
  .p1-left { 
    width: 50%; background: var(--green-dark); color: white; 
    padding: 60px; display: flex; flex-direction: column; justify-content: center;
  }
  .p1-logo { font-weight: 800; font-size: 24px; margin-bottom: auto; }
  .p1-headline { font-size: 54px; font-weight: 800; line-height: 1.1; margin-bottom: 20px; color: var(--orange); }
  .p1-name { font-size: 28px; font-weight: 700; margin: 40px 0 10px 0; }
  .p1-role { font-size: 18px; opacity: 0.8; font-weight: 500; }
  .p1-tagline { margin-top: auto; padding-top: 40px; border-top: 1px solid rgba(255,255,255,0.2); font-size: 16px; font-weight: 500; }
  
  .p1-right { 
    width: 50%; background: white; padding: 60px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
  }
  .p1-chart { width: 80%; height: 60%; border-left: 4px solid var(--green-dark); border-bottom: 4px solid var(--green-dark); position: relative; }
  .p1-arrow { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; object-fit: contain; object-position: bottom left; }

  /* PAGE 2: CONTEXT */
  .p2-layout { display: flex; height: 100%; padding: 40px; gap: 40px; background: var(--gray-bg); flex-direction: column; }
  .p2-header { font-size: 32px; font-weight: 800; color: var(--green-dark); margin-bottom: 20px; }
  .p2-content { display: flex; gap: 40px; flex: 1; }
  
  .p2-left { width: 50%; display: flex; flex-direction: column; gap: 15px; }
  .sit-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); display: flex; align-items: flex-start; gap: 15px; border-left: 4px solid var(--green-light); }
  .sit-card.good-news { background: var(--green-dark); color: white; border-left-color: var(--orange); }
  .sit-icon { width: 32px; height: 32px; background: var(--gray-bg); color: var(--green-dark); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 800; flex-shrink: 0; }
  .sit-card.good-news .sit-icon { background: rgba(255,255,255,0.1); color: var(--orange); }
  .sit-text h4 { margin: 0 0 5px 0; font-size: 16px; font-weight: 700; }
  .sit-text p { margin: 0; font-size: 14px; opacity: 0.8; line-height: 1.4; }

  .p2-right { width: 50%; display: flex; flex-direction: column; gap: 20px; }
  .qa-card { background: white; padding: 24px; border-radius: 8px; border-top: 4px solid var(--orange); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
  .qa-q { font-weight: 800; font-size: 18px; color: var(--green-dark); margin: 0 0 10px 0; }
  .qa-a { margin: 0; font-size: 15px; color: var(--gray-text); line-height: 1.5; }
  
  .p2-quote { background: var(--green-dark); color: white; padding: 20px 40px; border-radius: 8px; font-size: 18px; font-weight: 600; font-style: italic; text-align: center; margin-top: auto; }

  /* PAGE 3: WHY SCALER + CTA */
  .p3-layout { display: flex; flex-direction: column; height: 100%; padding: 40px; background: white; }
  .p3-header { font-size: 32px; font-weight: 800; color: var(--green-dark); margin-bottom: 30px; text-align: center; }
  
  .features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
  .feat-card { padding: 24px; background: var(--gray-bg); border-radius: 8px; border-left: 4px solid var(--green-light); }
  .feat-card h4 { margin: 0 0 8px 0; font-size: 18px; font-weight: 800; color: var(--green-dark); }
  .feat-card p { margin: 0; font-size: 14px; color: var(--gray-text); line-height: 1.5; }

  .cta-section { background: var(--green-dark); color: white; border-radius: 12px; padding: 40px; display: flex; margin-top: auto; }
  .cta-left { width: 60%; }
  .cta-title { font-size: 36px; font-weight: 800; color: var(--orange); margin: 0 0 15px 0; }
  .cta-body { font-size: 18px; line-height: 1.5; margin: 0 0 25px 0; }
  .pills { display: flex; gap: 10px; flex-wrap: wrap; }
  .pill { background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; }
  
  .cta-right { width: 40%; display: flex; align-items: center; justify-content: center; }
  .staircase { width: 120px; height: 120px; border-bottom: 4px solid var(--orange); border-right: 4px solid var(--orange); position: relative; }
  .staircase::before { content: ""; position: absolute; bottom: 33%; right: 33%; width: 100%; height: 100%; border-bottom: 4px solid var(--orange); border-right: 4px solid var(--orange); }
  .staircase::after { content: ""; position: absolute; bottom: 66%; right: 66%; width: 100%; height: 100%; border-bottom: 4px solid var(--orange); border-right: 4px solid var(--orange); }

</style>
</head>
<body>

  <!-- PAGE 1 -->
  <div class="page">
    <div class="p1-layout">
      <div class="p1-left">
        <div class="p1-logo">Scaler</div>
        <h1 class="p1-headline">{{PAGE1_HEADLINE}}</h1>
        <div class="p1-name">{{NAME}}</div>
        <div class="p1-role">{{ROLE}}</div>
        <div class="p1-tagline">{{PAGE1_TAGLINE}}</div>
      </div>
      <div class="p1-right">
        <div class="p1-chart">
          <!-- Geometric arrow representation -->
          <svg viewBox="0 0 100 100" style="position:absolute; bottom:0; left:0; width:120%; height:120%; overflow:visible;">
            <path d="M 0,100 C 30,100 40,60 60,60 C 80,60 90,20 100,0" fill="none" stroke="var(--green-light)" stroke-width="6" stroke-linecap="round"/>
            <polygon points="90,-10 110,-5 100,15" fill="var(--green-light)"/>
            <circle cx="60" cy="60" r="4" fill="var(--orange)"/>
            <circle cx="30" cy="85" r="4" fill="var(--orange)"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <!-- PAGE 2 -->
  <div class="page">
    <div class="p2-layout">
      <div class="p2-content">
        <div class="p2-left">
          <h2 class="p2-header">Where You Stand</h2>
          {{SITUATION_ITEMS}}
        </div>
        <div class="p2-right">
          <h2 class="p2-header" style="color:var(--orange);">Questions Answered</h2>
          {{QUESTIONS_ANSWERED}}
        </div>
      </div>
      <div class="p2-quote">"{{PULL_QUOTE}}"</div>
    </div>
  </div>

  <!-- PAGE 3 -->
  <div class="page">
    <div class="p3-layout">
      <h2 class="p3-header">Why This Makes Sense</h2>
      <div class="features-grid">
        {{WHY_SCALER_FEATURES}}
      </div>
      <div class="cta-section">
        <div class="cta-left">
          <h2 class="cta-title">{{NEXT_STEP_TITLE}}</h2>
          <p class="cta-body">{{NEXT_STEP_BODY}}</p>
          <div class="pills">
            {{WHY_TAKE_IT_PILLS}}
          </div>
        </div>
        <div class="cta-right">
          <div class="staircase"></div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
